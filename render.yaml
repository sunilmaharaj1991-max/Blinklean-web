services:
  # ----------------------------------------------------------------------------
  # Backend API (NestJS)
  # ----------------------------------------------------------------------------
  - type: web
    name: blinklean-api
    env: node
    plan: free # Change to 'starter' if more power is needed
    rootDir: blinklean-backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: blinklean-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FAST2SMS_API_KEY
        sync: false # Set this in Render Dashboard
      - key: OTP_EXPIRY
        value: 300

  # ----------------------------------------------------------------------------
  # Frontend App (React/Vite)
  # ----------------------------------------------------------------------------
  - type: static
    name: blinklean-web
    env: static
    plan: free
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: blinklean-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ----------------------------------------------------------------------------
# Managed PostgreSQL Database
# ----------------------------------------------------------------------------
databases:
  - name: blinklean-db
    plan: free # Render's free DB expires in 90 days. Keep this in mind!
    region: singapore # Adjust based on your primary users
